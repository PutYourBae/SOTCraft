<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Rounded card body with dark red gradient -->
  <rect x="8" y="4" width="48" height="56" rx="8" fill="#1a0808" stroke="#801010" stroke-width="2"/>
  
  <!-- Outer glowing ring -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#d4962a" stroke-dasharray="4 2" stroke-opacity="0.6"/>

  <!-- Golden Skull outline/shape in the center -->
  <!-- Skull Head -->
  <path d="M24 24C24 18 40 18 40 24C40 28 38 32 38 36H26C26 32 24 28 24 24Z" fill="#e6c077"/>
  <!-- Jaw -->
  <rect x="28" y="36" width="8" height="6" rx="1" fill="#e6c077"/>
  <!-- Eyes -->
  <circle cx="28" cy="24" r="3" fill="#1a0808"/>
  <circle cx="36" cy="24" r="3" fill="#1a0808"/>
  <!-- Nose (triangle) -->
  <polygon points="32,28 30,31 34,31" fill="#1a0808"/>
  <!-- Teeth slits -->
  <line x1="30" y1="39" x2="30" y2="41" stroke="#1a0808" stroke-width="1"/>
  <line x1="32" y1="39" x2="32" y2="41" stroke="#1a0808" stroke-width="1"/>
  <line x1="34" y1="39" x2="34" y2="41" stroke="#1a0808" stroke-width="1"/>
  
  <!-- Tiny card details -->
  <rect x="12" y="8" width="6" height="2" fill="#801010"/>
  <rect x="46" y="8" width="6" height="2" fill="#801010"/>
  <circle cx="32" cy="52" r="1.5" fill="#e6c077"/>
</svg>
