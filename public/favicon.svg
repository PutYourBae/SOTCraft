<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with dark gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="hammerHead" x1="10" y1="10" x2="45" y2="35" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="50%" stop-color="#d4962a"/>
      <stop offset="100%" stop-color="#a0681a"/>
    </linearGradient>
    <linearGradient id="hammerHandle" x1="30" y1="28" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#5C3A1E"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#d4962a" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Hammer handle (rotated 45deg, going bottom-right) -->
  <rect
    x="30" y="28"
    width="9" height="30"
    rx="3"
    fill="url(#hammerHandle)"
    transform="rotate(45 34 43)"
    filter="url(#glow)"
  />

  <!-- Hammer head -->
  <rect
    x="8" y="10"
    width="30" height="18"
    rx="4"
    fill="url(#hammerHead)"
    transform="rotate(45 23 19)"
    filter="url(#glow)"
  />

  <!-- Highlight on hammer head top-left -->
  <rect
    x="8" y="10"
    width="30" height="7"
    rx="4"
    fill="white"
    fill-opacity="0.15"
    transform="rotate(45 23 19)"
  />

  <!-- Small spark/star accent top-right -->
  <circle cx="50" cy="12" r="2" fill="#f0c040" fill-opacity="0.8"/>
  <circle cx="55" cy="18" r="1.2" fill="#f0c040" fill-opacity="0.5"/>
  <circle cx="47" cy="17" r="1" fill="#f0c040" fill-opacity="0.4"/>
</svg>